<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Pulse - Your feed">
  <title>Pulse</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div class="layout-grid">
    <header class="sidebar">
      <div class="sidebar-inner">
        <a href="/index.html" class="logo">
          Pulse
        </a>
        <nav class="nav-menu">
          <a href="/index.html" class="nav-item">
            <span class="icon"><svg viewBox="0 0 24 24" aria-hidden="true" width="26" height="26" fill="currentColor"><g><path d="M12 1.696L.622 8.807l1.06 1.696L3 9.679V19.5C3 20.881 4.119 22 5.5 22h13c1.381 0 2.5-1.119 2.5-2.5V9.679l1.318.824 1.06-1.696L12 1.696zM12 16.5c-1.933 0-3.5-1.567-3.5-3.5s1.567-3.5 3.5-3.5 3.5 1.567 3.5 3.5-1.567 3.5-3.5 3.5z"></path></g></svg></span>
            <span class="text">Home</span>
          </a>
          <a href="/messages.html" id="nav-messages" class="nav-item">
            <span class="icon"><svg viewBox="0 0 24 24" aria-hidden="true" width="26" height="26" fill="currentColor"><g><path d="M1.998 5.5c0-1.381 1.119-2.5 2.5-2.5h15c1.381 0 2.5 1.119 2.5 2.5v13c0 1.381-1.119 2.5-2.5 2.5h-15c-1.381 0-2.5-1.119-2.5-2.5v-13zm2.5-.5c-.276 0-.5.224-.5.5v2.764l8 3.638 8-3.636V5.5c0-.276-.224-.5-.5-.5h-15zm15.5 5.463l-8 3.636-8-3.638V18.5c0 .276.224.5.5.5h15c.276 0 .5-.224.5-.5v-8.037z"></path></g></svg></span>
            <span class="text">Messages</span>
          </a>
          <a href="/profile.html" id="nav-profile" class="nav-item">
            <span class="icon"><svg viewBox="0 0 24 24" aria-hidden="true" width="26" height="26" fill="currentColor"><g><path d="M12 11.816c1.355 0 2.872-.15 3.84-1.256.814-.93 1.078-2.368.806-4.392-.38-2.825-2.117-4.512-4.646-4.512S7.734 3.343 7.354 6.17c-.272 2.022-.008 3.46.806 4.39.968 1.107 2.485 1.256 3.84 1.256zM8.84 6.368c.162-1.2.787-3.212 3.16-3.212s2.998 2.013 3.16 3.212c.207 1.55.057 2.627-.45 3.205-.455.52-1.266.743-2.71.743s-2.255-.223-2.71-.743c-.507-.578-.657-1.656-.45-3.205zm11.44 12.868c-.877-3.526-4.282-5.99-8.28-5.99s-7.403 2.464-8.28 5.99c-.172.692-.028 1.4.395 1.94.408.52 1.04.82 1.733.82h12.304c.693 0 1.325-.3 1.733-.82.424-.54.567-1.247.394-1.94zm-1.576 1.016c-.126.16-.316.246-.552.246H5.848c-.235 0-.426-.085-.552-.246-.137-.174-.18-.412-.12-.654.71-2.855 3.517-4.85 6.824-4.85s6.114 1.994 6.824 4.85c.06.241.017.48-.12.654z"></path></g></svg></span>
            <span class="text">Profile</span>
          </a>
          <button id="logout-btn" class="nav-item">
            <span class="icon"><svg viewBox="0 0 24 24" aria-hidden="true" width="26" height="26" fill="currentColor"><g><path d="M4 4.5C4 3.12 5.119 2 6.5 2h11C18.881 2 20 3.12 20 4.5v15c0 1.38-1.119 2.5-2.5 2.5h-11C5.119 22 4 20.88 4 19.5v-5h2v5c0 .28.224.5.5.5h11c.276 0 .5-.22.5-.5v-15c0-.28-.224-.5-.5-.5h-11c-.276 0-.5.22-.5.5v5H4v-5zm10.707 5.793l2.793 2.793-2.793 2.793-1.414-1.414L14.586 13H8v-2h6.586l-1.293-1.293 1.414-1.414z"></path></g></svg></span>
            <span class="text">Logout</span>
          </button>
        </nav>
        <button class="btn btn-primary btn-block btn-post-sidebar">Post</button>
      </div>
    </header>

    <main id="feed-page" class="feed-column">
      <div class="feed-tabs">
        <button class="feed-tab active" data-tab="following">Following</button>
        <button class="feed-tab" data-tab="explore">Explore</button>
      </div>

      <div class="composer">
        <div class="composer-avatar" id="composer-avatar-placeholder"></div>
        <form id="compose-form" class="composer-form" enctype="multipart/form-data">
          <textarea
            id="compose-textarea"
            class="composer-textarea"
            placeholder="What is happening?!"
            maxlength="500"
          ></textarea>
          <div id="image-preview-container" style="display:none; position:relative; margin-bottom: 12px;">
             <img id="image-preview" src="" alt="Preview" style="max-width:100%; border-radius:16px; border:1px solid var(--border);">
             <button type="button" id="remove-image-btn" style="position:absolute; top:8px; right:8px; background:rgba(0,0,0,0.7); color:white; border:none; border-radius:50%; width:32px; height:32px; cursor:pointer; display:flex; align-items:center; justify-content:center;">✕</button>
          </div>
          <div class="composer-footer">
            <div class="composer-actions">
              <label for="post-image-input" class="action-btn" style="cursor:pointer; color:var(--accent); display:flex; align-items:center; justify-content:center;">
                <div class="icon-bg"><svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><g><path d="M3 5.5C3 4.119 4.119 3 5.5 3h13C19.881 3 21 4.119 21 5.5v13c0 1.381-1.119 2.5-2.5 2.5h-13C4.119 21 3 19.881 3 18.5v-13zM5.5 5c-.276 0-.5.224-.5.5v9.086l3-3 3 3 5-5 3 3V5.5c0-.276-.224-.5-.5-.5h-13zM19 15.414l-3-3-5 5-3-3-3 3V18.5c0 .276.224.5.5.5h13c.276 0 .5-.224.5-.5v-3.086zM9.75 7C8.784 7 8 7.784 8 8.75s.784 1.75 1.75 1.75 1.75-.784 1.75-1.75S10.716 7 9.75 7z"></path></g></svg></div>
              </label>
              <input type="file" id="post-image-input" accept="image/jpeg,image/png,image/webp,image/gif" style="display:none;">
            </div>
            <div style="display:flex; align-items:center; gap:12px;">
              <span id="char-counter" class="char-counter">0 / 500</span>
              <button type="submit" class="btn btn-primary btn-sm" id="compose-btn" disabled>
                Post
              </button>
            </div>
          </div>
        </form>
      </div>

      <div id="feed-container"></div>

      <div id="load-more-wrapper" class="load-more-wrapper hidden">
        <button class="btn btn-outline btn-sm" id="load-more-btn">Load more</button>
      </div>

      <div id="feed-spinner" class="spinner hidden"></div>
    </main>

    <aside class="right-sidebar">
      <div class="right-sidebar-inner">
        <div class="search-widget">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="var(--text-secondary)"><g><path d="M10.25 3.75c-3.59 0-6.5 2.91-6.5 6.5s2.91 6.5 6.5 6.5c1.795 0 3.419-.726 4.596-1.904 1.178-1.177 1.904-2.801 1.904-4.596 0-3.59-2.91-6.5-6.5-6.5zm-8.5 6.5c0-4.694 3.806-8.5 8.5-8.5s8.5 3.806 8.5 8.5c0 1.986-.682 3.815-1.824 5.262l4.781 4.781-1.414 1.414-4.781-4.781c-1.447 1.142-3.276 1.824-5.262 1.824-4.694 0-8.5-3.806-8.5-8.5z"></path></g></svg>
          <input type="text" placeholder="Search" />
        </div>
        <div class="widget">
          <h3>Trending</h3>
          <div class="wtf-item" style="display:block;">
            <div style="font-size:0.85rem; color:var(--text-secondary);">1 · Technology · Trending</div>
            <div style="font-weight:700; margin-top:2px;">#WebDev</div>
            <div style="font-size:0.85rem; color:var(--text-secondary); margin-top:2px;">15.4K posts</div>
          </div>
          <div class="wtf-item" style="display:block;">
            <div style="font-size:0.85rem; color:var(--text-secondary);">2 · Programming · Trending</div>
            <div style="font-weight:700; margin-top:2px;">JavaScript</div>
            <div style="font-size:0.85rem; color:var(--text-secondary); margin-top:2px;">8,230 posts</div>
          </div>
        </div>
        <div class="widget">
          <h3>Who to follow</h3>
          <div id="who-to-follow-container">
             <div class="spinner"></div>
          </div>
        </div>
      </div>
    </aside>
  </div>

  <div id="toast-container" class="toast-container"></div>

  <script src="/app.js"></script>
</body>
</html>
