<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Create a new Pulse account">
  <title>Pulse - Create Account</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <main id="register-page" class="auth-wrapper">
    <div class="auth-card">
      <div class="auth-header">
        <div class="logo">Pul<span>se</span></div>
        <p>Create your account to get started.</p>
      </div>

      <div id="auth-error" class="auth-error"></div>

      <form id="register-form">
        <div class="form-group">
          <label for="username">Username</label>
          <input
            type="text"
            id="username"
            class="form-input"
            placeholder="Choose a username"
            required
            autocomplete="username"
          >
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input
            type="email"
            id="email"
            class="form-input"
            placeholder="you@example.com"
            required
            autocomplete="email"
          >
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input
            type="password"
            id="password"
            class="form-input"
            placeholder="Create a password"
            required
            autocomplete="new-password"
          >
        </div>

        <button type="submit" class="btn btn-primary btn-block" id="register-btn">
          Create Account
        </button>
      </form>

      <div class="auth-footer">
        Already have an account? <a href="/login.html">Sign in</a>
      </div>
    </div>
  </main>

  <script src="/app.js"></script>
</body>
</html>
